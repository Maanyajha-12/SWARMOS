[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.21"

[profile.default.model_checker]
contracts = {}
engine = "chc"
timeout = 10000
targets = ["assert"]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "preserve"
func_attrs_order = ["public", "payable", "view", "pure"]
sort_imports = true

[rpc_endpoints]
0g_testnet = "https://rpc-testnet.0g.ai"
localhost = "http://127.0.0.1:8545"
